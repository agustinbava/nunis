<body class="bg-background text-on-background font-body-md antialiased min-h-screen flex flex-col md:flex-row overflow-x-hidden">
<!-- Left Side: Hero Image -->
<div class="w-full md:w-1/2 h-[30vh] md:h-screen relative overflow-hidden flex-shrink-0">
<div class="absolute inset-0 bg-cover bg-center w-full h-full hero-zoom" data-alt="A serene, high-quality photograph of a peaceful landscape at dawn, with soft pastel colors blending seamlessly. The atmosphere is calm, aspirational, and meditative, matching the clean and airy aesthetic of a premium mental well-being app. Gentle morning light illuminates the scene, promoting relaxation and clarity." style="background-image: url('https://images.unsplash.com/photo-1545389336-cf090694435e?w=1200&q=90')"></div>
<!-- Optional overlay for better integration -->
<div class="absolute inset-0 bg-gradient-to-t md:bg-gradient-to-r from-background/40 to-transparent"></div>
</div>
<!-- Right Side: Login Form -->
<div class="w-full md:w-1/2 flex flex-col justify-center px-container-margin py-section-gap md:px-16 lg:px-32 bg-surface-container-lowest min-h-[70vh] md:min-h-screen relative z-10 rounded-t-[32px] md:rounded-none -mt-8 md:mt-0 shadow-[0_-8px_32px_rgba(108,92,231,0.04)] md:shadow-none">
<div class="max-w-md w-full mx-auto flex flex-col h-full md:justify-center">
<!-- Logo & Header -->
<div class="mb-stack-lg text-center md:text-left mt-8 md:mt-0">
<img alt="Nunis Logo" class="h-20 w-auto mx-auto md:mx-0 mb-8 object-contain" src="nunis-logo.png"/>
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-background italic mb-stack-sm">Bienvenido</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Inicia sesión para continuar tu viaje.</p>
</div>
<!-- Form -->
<form class="space-y-stack-md flex-grow md:flex-grow-0">
<!-- Email Input -->
<div class="group">
<label class="block font-label-md text-label-md text-on-surface mb-unit" for="email">Correo electrónico</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-transparent focus:border-calma-primary focus:ring-0 rounded-2xl px-5 py-4 font-body-md text-body-md text-on-surface transition-all duration-300 ease-out placeholder:text-outline/60 outline-none" id="email" name="email" placeholder="tu@email.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="group">
<label class="block font-label-md text-label-md text-on-surface mb-unit flex justify-between" for="password">
                        Contraseña
                        <a class="text-calma-primary hover:text-primary transition-colors font-label-sm text-label-sm font-normal" href="#">¿Olvidaste tu contraseña?</a>
</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-transparent focus:border-calma-primary focus:ring-0 rounded-2xl px-5 py-4 font-body-md text-body-md text-on-surface transition-all duration-300 ease-out placeholder:text-outline/60 outline-none" id="password" name="password" placeholder="Tu contraseña" type="password"/>
<button aria-label="Mostrar contraseña" aria-pressed="false" class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" id="togglePassword" type="button">
<span class="material-symbols-outlined" data-icon="visibility" id="togglePasswordIcon">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<div class="pt-unit">
<button class="w-full bg-calma-primary hover:bg-primary text-on-primary font-label-md text-label-md rounded-full py-4 px-6 flex items-center justify-center gap-2 transition-all duration-300 ease-out hover:scale-[0.99] active:scale-95 shadow-[0_8px_24px_rgba(108,92,231,0.25)] hover:shadow-[0_12px_32px_rgba(108,92,231,0.3)]" type="submit">
                        Entrar
                        <span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
<!-- Links & Footer -->
<div class="mt-stack-lg text-center space-y-stack-md pb-8 md:pb-0">
<p class="font-body-md text-body-md text-on-surface-variant">
                    ¿No tenés cuenta? 
                    <a class="text-calma-primary font-label-md font-semibold hover:text-primary transition-colors hover:underline underline-offset-4 decoration-2" href="/register">Registrarse</a>
</p>
<div class="flex items-center justify-center gap-2 text-outline-variant font-label-sm text-label-sm mt-section-gap opacity-80">
<span class="material-symbols-outlined text-[16px]" data-icon="lock">lock</span>
<p>Tus datos están encriptados de extremo a extremo</p>
</div>
</div>
</div>
</div>
<script>
  // Mostrar/ocultar contraseña
  (function () {
    var btn = document.getElementById('togglePassword');
    var icon = document.getElementById('togglePasswordIcon');
    var input = document.getElementById('password');
    if (!btn || !icon || !input) return;
    btn.addEventListener('click', function () {
      var show = input.type === 'password';
      input.type = show ? 'text' : 'password';
      icon.textContent = show ? 'visibility_off' : 'visibility';
      btn.setAttribute('aria-label', show ? 'Ocultar contraseña' : 'Mostrar contraseña');
      btn.setAttribute('aria-pressed', show ? 'true' : 'false');
      input.focus();
    });
  })();

  document.querySelector('form').addEventListener('submit', function(e) {
    e.preventDefault();
    var email = document.getElementById('email').value;
    var password = document.getElementById('password').value;
    if (window.parent !== window) {
      window.parent.postMessage({ type: 'nunis-login', email: email, password: password }, '*');
    }
  });
</script>
</body></html>
